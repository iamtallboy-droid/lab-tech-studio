<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="100%" height="100%">
  <!-- Blue Circle Base -->
  <circle cx="110" cy="110" r="110" fill="#0F6FFF" />

  <!-- Circuit Lines (Rising Upwards) -->
  <!-- Center Main Trace -->
  <path d="M 110,110 L 110,25" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none" />
  <circle cx="110" cy="25" r="9" fill="#FFFFFF" />

  <!-- Left Inner Trace -->
  <path d="M 92,110 L 92,55 L 70,55" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" fill="none" />
  <circle cx="70" cy="55" r="8" fill="#FFFFFF" />

  <!-- Left Outer Trace -->
  <path d="M 74,110 L 74,75 L 35,75" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" fill="none" />
  <circle cx="35" cy="75" r="8" fill="#FFFFFF" />

  <!-- Right Inner Trace -->
  <path d="M 128,110 L 128,55 L 150,55" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" fill="none" />
  <circle cx="150" cy="55" r="8" fill="#FFFFFF" />

  <!-- Right Outer Trace -->
  <path d="M 146,110 L 146,75 L 185,75" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" fill="none" />
  <circle cx="185" cy="75" r="8" fill="#FFFFFF" />

  <!-- Gear Element (Bottom Half of Circle) -->
  <!-- Inner cutout semi-circle -->
  <path d="M 50,110 A 60,60 0 0,0 170,110 L 150,110 A 40,40 0 0,1 70,110 Z" fill="#FFFFFF" />
  
  <!-- Outer Gear teeth ring (bottom half) -->
  <path d="M 30,110 A 80,80 0 0,0 190,110" stroke="#FFFFFF" stroke-width="14" stroke-linecap="butt" fill="none" />
  
  <!-- Individual Gear Teeth -->
  <!-- Left tooth -->
  <path d="M 45,150 L 30,165 L 40,178 L 55,160 Z" fill="#FFFFFF" />
  <!-- Bottom Left tooth -->
  <path d="M 75,178 L 68,198 L 82,205 L 88,184 Z" fill="#FFFFFF" />
  <!-- Center Bottom tooth -->
  <path d="M 103,188 L 103,210 L 117,210 L 117,188 Z" fill="#FFFFFF" />
  <!-- Bottom Right tooth -->
  <path d="M 132,184 L 138,205 L 152,198 L 145,178 Z" fill="#FFFFFF" />
  <!-- Right tooth -->
  <path d="M 165,160 L 180,178 L 190,165 L 175,150 Z" fill="#FFFFFF" />
</svg>
